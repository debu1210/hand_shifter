<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Contrast 3D Particles - Pulse Edition</title>
    
    <link rel="stylesheet" href="style.css">

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe Hands Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui">
        <h2>Particle Engine</h2>
        <p>AI Camera: <span id="status" class="status-wait">Initializing...</span></p>
        <p>Current Template: <span id="shape-name" class="status-ok">Sphere</span></p>
        <ul>
            <li><b>Move Hand:</b> Rotate System</li>
            <li><b>Pinch Fingers:</b> Expand / Contract</li>
            <li><b>Move Left/Right:</b> Shift Colors</li>
            <li><b>Close Fist (1 sec):</b> Morph Shape</li>
        </ul>
    </div>

    <!-- Hidden video element strictly required for AI tracking -->
    <video id="video-element" autoplay playsinline muted></video>
    <div id="canvas-container"></div>

    <script src="script.js"></script>
</body>
</html>
